site_name: LITAI LLC
site_description: LITAI LLC — Document AI, RAG evaluation, and production-grade extraction systems for investment firms, legal ops, and enterprise platforms.
site_url: https://litai-solutions.com

nav:
  - Home:
    - About: index.md
  - Services: services.md
  - Case Studies:
    - Overview: portfolio/index.md
    - Projects:
      - portfolio/projects/project-1.md
      - portfolio/projects/project-2.md
      - portfolio/projects/project-3.md
    - Hobby Projects:
      - portfolio/projects/project-4.md
      - portfolio/projects/project-5.md
  - Blog:
    - blog/index.md

theme:
  name: material
  features:
    - search.suggest
    - toc.integrate
    - navigation.tabs
    # - navigation.expand  # disabled: caused mobile menu to auto-open Home submenu
    - navigation.sections
    - navigation.instant
    - navigation.instant.prefetch
    - content.tooltips
    - content.tabs.link
    - content.code.copy
    - navigation.footer
  language: en
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline 
        name: Switch to dark mode
      primary: custom
      accent: custom  
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode    
      primary: custom
      accent: custom
  font:
    text: Roboto
    code: Roboto Mono
  logo: assets/Logo-Icon-1.png
  favicon: assets/Logo-Icon-1.png

extra:
  generator: true
  social:
 #   - icon: fontawesome/solid/building
 #     link: https://company.com
    - icon: fontawesome/brands/github
      link: https://github.com/litai-solutions
 #   - icon: fontawesome/brands/youtube
 #     link: https://youtube.com/
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/halyna-galanzina/
  analytics:
    # provider: google
    # property: G-W9Y130NXVZ

extra_css:
  - stylesheets/extra.css
  - stylesheets/hero.css
plugins:
  - search
  # - social:
  #     cards_layout_options:
  #       background_color: "#111111"
  - blog:
      blog_dir: blog
      authors_file: "{blog}/.authors.yml"
      categories: true

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.critic
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - def_list
  - pymdownx.keys

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js

extra_files:
  - docs/robots.txt

copyright: |
  &copy; 2026 <a href="https://www.linkedin.com/in/halyna-galanzina/" target="_blank" rel="noopener">LITAI LLC</a>. All rights reserved.